<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 打地鼠 - V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 50%, #1a472a 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        #crosshair {
            position: fixed;
            width: 40px; height: 40px;
            pointer-events: none;
            z-index: 2147483647;
            transform: translate(-50%, -50%);
            display: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #ffffff;
        }
        #crosshair::before { width: 3px; height: 100%; left: 50%; transform: translateX(-50%); box-shadow: 0 0 3px rgba(0,0,0,0.5); }
        #crosshair::after { width: 100%; height: 3px; top: 50%; transform: translateY(-50%); box-shadow: 0 0 3px rgba(0,0,0,0.5); }
        #crosshair .center {
            position: absolute;
            width: 8px; height: 8px;
            background: #ff3333;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .hit-effect {
            position: fixed;
            width: 60px; height: 60px;
            border: 4px solid #ff6b6b;
            border-radius: 50%;
            pointer-events: none;
            animation: hitRing 0.4s ease-out forwards;
            z-index: 150;
        }
        @keyframes hitRing {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        #ui-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 50;
            pointer-events: none;
        }
        .btn {
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
            color: #1a472a;
            border: none;
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 20px rgba(255,215,0,0.4);
            pointer-events: auto;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,215,0,0.6); }
        .btn:active { transform: scale(0.98); }
        .btn-small {
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 20px;
        }
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="ui-canvas"></canvas>
    <div id="crosshair"><div class="center"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== GAME DATA & STATE ====================
        const SAVE_KEY = 'whackamole_v2_save';
        const WORLDS = ['森林', '矿山', '冰原'];
        const WORLD_THEMES = [
            { bg: 0x1a472a, ground: 0x3d7a4a, fog: 0x1a472a },
            { bg: 0x3d2817, ground: 0x5a4030, fog: 0x3d2817 },
            { bg: 0x1a3a4a, ground: 0x3a6080, fog: 0x1a3a4a }
        ];
        const LEVELS_PER_WORLD = 10;
        const STAR_THRESHOLDS = [500, 1000, 2000];
        
        const MOLE_SKINS = ['普通', '工程师', '僵尸', '恐龙', '机甲'];
        const HAMMER_SKINS = ['木', '金', '火', '雷电'];
        const MOLE_SKIN_COLORS = [
            { body: 0x8B6914, head: 0x8B6914 },  // 普通
            { body: 0x888888, head: 0x666666 },  // 工程师
            { body: 0x556B2F, head: 0x6B8E23 },  // 僵尸
            { body: 0x228B22, head: 0x32CD32 },  // 恐龙
            { body: 0x4A4A4A, head: 0x696969 }   // 机甲
        ];
        const HAMMER_COLORS = [0x8B4513, 0xFFD700, 0xFF4500, 0x9370DB];
        
        const SHOP_ITEMS = {
            passive: [
                { id: 'speed', name: '攻速+5%', desc: '地鼠冒出速度+5%', cost: 500, maxLevel: 10, icon: '⚡' },
                { id: 'life', name: '额外生命+1', desc: '初始生命+1', cost: 800, maxLevel: 3, icon: '❤' },
                { id: 'vision', name: '视野扩大+10%', desc: '视野范围+10%', cost: 600, maxLevel: 5, icon: '👁' }
            ],
            moleSkins: [
                { id: 'skin_engineer', name: '工程师地鼠', cost: 1000, skinIndex: 1 },
                { id: 'skin_zombie', name: '僵尸地鼠', cost: 1500, skinIndex: 2 },
                { id: 'skin_dino', name: '恐龙地鼠', cost: 2000, skinIndex: 3 },
                { id: 'skin_mech', name: '机甲地鼠', cost: 3000, skinIndex: 4 }
            ],
            hammerSkins: [
                { id: 'hammer_gold', name: '黄金锤子', cost: 1200, skinIndex: 1 },
                { id: 'hammer_fire', name: '烈焰锤子', cost: 1800, skinIndex: 2 },
                { id: 'hammer_thunder', name: '雷电锤子', cost: 2500, skinIndex: 3 }
            ]
        };

        let defaultSave = () => ({
            coins: 0,
            stamina: 10,
            staminaTime: Date.now(),
            levels: Array(3).fill(null).map(() => Array(10).fill(0)),
            unlockedWorlds: [true, false, false],
            passiveLevels: { speed: 0, life: 0, vision: 0 },
            ownedMoleSkins: [true, false, false, false, false],
            ownedHammerSkins: [true, false, false, false],
            equippedMoleSkin: 0,
            equippedHammerSkin: 0,
            settings: { sound: true }
        });

        let gameData = loadGame();

        function loadGame() {
            try {
                let data = JSON.parse(localStorage.getItem(SAVE_KEY));
                if (!data) data = defaultSave();
                // Ensure all fields exist
                let fresh = defaultSave();
                for (let k in fresh) if (data[k] === undefined) data[k] = fresh[k];
                return data;
            } catch { return defaultSave(); }
        }

        function saveGame() {
            gameData.staminaTime = Date.now();
            localStorage.setItem(SAVE_KEY, JSON.stringify(gameData));
        }

        function getStamina() {
            let s = gameData.stamina;
            let elapsed = (Date.now() - gameData.staminaTime) / 1000;
            let recovered = Math.floor(elapsed / 300);
            return Math.min(10, s + recovered);
        }

        function useStamina() {
            let s = getStamina();
            if (s <= 0) return false;
            gameData.stamina = s - 1;
            saveGame();
            return true;
        }

        function getEquippedMoleSkin() { return gameData.equippedMoleSkin; }
        function getEquippedHammerSkin() { return gameData.equippedHammerSkin; }
        function getPassiveSpeedBonus() { return 1 + gameData.passiveLevels.speed * 0.05; }
        function getPassiveLifeBonus() { return gameData.passiveLevels.life; }
        function getPassiveVisionBonus() { return 1 + gameData.passiveLevels.vision * 0.1; }

        // ==================== UI SYSTEM ====================
        const canvas = document.getElementById('ui-canvas');
        const ctx = canvas.getContext('2d');
        let uiButtons = [];
        let currentScreen = 'menu';
        let selectedLevel = null;
        let selectedWorld = 0;
        let selectedInstantItem = null;
        let shopTab = 'passive';
        let gachaAnimating = false;
        let gachaResult = [];

        function resizeUI() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeUI);
        resizeUI();

        function isPointInButton(px, py, btn) {
            return px >= btn.x && px <= btn.x + btn.w && py >= btn.y && py <= btn.y + btn.h;
        }

        function addButton(x, y, w, h, label, action, style = 'normal', color = '#ffd700') {
            uiButtons.push({ x, y, w, h, label, action, style, color });
        }

        function clearButtons() { uiButtons = []; }

        function drawButton(btn, hovered) {
            ctx.save();
            let scale = hovered ? 1.02 : 1;
            let cx = btn.x + btn.w / 2, cy = btn.y + btn.h / 2;
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -cy);

            let gradient = ctx.createLinearGradient(btn.x, btn.y, btn.x, btn.y + btn.h);
            if (btn.style === 'disabled') {
                gradient.addColorStop(0, '#666');
                gradient.addColorStop(1, '#444');
            } else if (btn.style === 'danger') {
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(1, '#c44');
            } else if (btn.style === 'success') {
                gradient.addColorStop(0, '#4ecdc4');
                gradient.addColorStop(1, '#2a9d8f');
            } else {
                gradient.addColorStop(0, btn.color);
                gradient.addColorStop(1, shadeColor(btn.color, -30));
            }
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 12);
            ctx.fill();
            
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 4;
            
            ctx.fillStyle = btn.style === 'disabled' ? '#999' : (btn.style === 'success' ? '#fff' : '#1a472a');
            ctx.font = `bold ${Math.min(20, btn.w / 8)}px Segoe UI`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2);
            ctx.restore();
        }

        function shadeColor(color, percent) {
            let num = parseInt(color.replace('#', ''), 16);
            let amt = Math.round(2.55 * percent);
            let R = Math.min(255, Math.max(0, (num >> 16) + amt));
            let G = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amt));
            let B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
            return `rgb(${R},${G},${B})`;
        }

        function drawStar(x, y, size, filled) {
            ctx.save();
            ctx.translate(x, y);
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                let angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                let r = i % 2 === 0 ? size : size / 2;
                if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.fillStyle = filled ? '#ffd700' : '#555';
            ctx.fill();
            if (filled) {
                ctx.strokeStyle = '#ff8c00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawStars(x, y, count, size = 15) {
            for (let i = 0; i < 3; i++) {
                drawStar(x + i * size * 2, y, size, i < count);
            }
        }

        // ==================== MENU SCREEN ====================
        function drawMenuScreen() {
            clearButtons();
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let cx = canvas.width / 2;
            
            // Title
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 56px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('3D 打地鼠', cx, 120);
            
            ctx.fillStyle = '#aaa';
            ctx.font = '20px Segoe UI';
            ctx.fillText('V2 进度版', cx, 170);

            // Coins & Stamina
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 22px Segoe UI';
            ctx.fillText(`💰 ${gameData.coins}`, cx - 100, 220);
            ctx.fillStyle = '#4ecdc4';
            ctx.fillText(`⚡ ${getStamina()}/10`, cx + 100, 220);

            // Buttons
            let btnW = 250, btnH = 60, startY = 280;
            addButton(cx - btnW/2, startY, btnW, btnH, '🎮 开始游戏', () => { currentScreen = 'modeSelect'; });
            addButton(cx - btnW/2, startY + 80, btnW, btnH, '📋 关卡选择', () => { currentScreen = 'levelSelect'; selectedWorld = 0; });
            addButton(cx - btnW/2, startY + 160, btnW, btnH, '🛒 商店', () => { currentScreen = 'shop'; shopTab = 'passive'; });
            addButton(cx - btnW/2, startY + 240, btnW, btnH, '🎁 收藏', () => { currentScreen = 'collection'; });

            // Draw buttons
            uiButtons.forEach((btn, i) => drawButton(btn, hoveredBtn === i));
        }

        // ==================== MODE SELECT SCREEN ====================
        function drawModeSelectScreen() {
            clearButtons();
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let cx = canvas.width / 2;
            
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 42px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('选择模式', cx, 100);

            // Check stamina for classic
            let staminaOK = getStamina() > 0;
            let btnW = 300, btnH = 80, startY = 200;
            
            addButton(cx - btnW/2, startY, btnW, btnH, '🏆 经典模式', () => { 
                if (useStamina()) { currentScreen = 'playing'; gameMode = 'classic'; startClassicGame(); }
            }, staminaOK ? 'normal' : 'disabled');
            
            addButton(cx - btnW/2, startY + 100, btnW, btnH, '📍 关卡模式', () => { 
                if (useStamina()) { currentScreen = 'instantItemSelect'; }
            }, staminaOK ? 'normal' : 'disabled');

            // Show stamina warning
            if (!staminaOK) {
                ctx.fillStyle = '#ff6b6b';
                ctx.font = '18px Segoe UI';
                ctx.fillText('体力不足，请稍后再来', cx, startY + 210);
            }

            addButton(50, 50, 100, 40, '← 返回', () => { currentScreen = 'menu'; }, 'success');
            
            uiButtons.forEach((btn, i) => drawButton(btn, hoveredBtn === i));
        }

        // ==================== INSTANT ITEM SELECT SCREEN ====================
        const INSTANT_ITEMS = [
            { id: 'slow', name: '减速手套', desc: '地鼠冒出速度-50%', icon: '🦾', cost: 0 },
            { id: 'double', name: '双倍积分', desc: '得分×2', icon: '✌️', cost: 0 },
            { id: 'super', name: '超级锤子', desc: '必定命中，5次', icon: '🔨', cost: 0 }
        ];

        function drawInstantItemSelectScreen() {
            clearButtons();
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let cx = canvas.width / 2;
            
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 42px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('选择道具', cx, 80);
            
            ctx.fillStyle = '#aaa';
            ctx.font = '16px Segoe UI';
            ctx.fillText('（局前选择，局内使用）', cx, 115);

            // Instant items
            let itemY = 170;
            INSTANT_ITEMS.forEach((item, i) => {
                let selected = selectedInstantItem === item.id;
                let btnW = 350, btnH = 70;
                addButton(cx - btnW/2, itemY + i * 90, btnW, btnH, `${item.icon} ${item.name}`, () => {
                    selectedInstantItem = selectedInstantItem === item.id ? null : item.id;
                }, 'normal', selected ? '#4ecdc4' : '#ffd700');
                
                ctx.fillStyle = selected ? '#4ecdc4' : '#888';
                ctx.font = '14px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText(item.desc, cx, itemY + i * 90 + 45);
            });

            addButton(cx - 150, itemY + 300, 300, 60, '开始游戏', () => {
                currentScreen = 'levelSelect';
            });

            addButton(50, 50, 100, 40, '← 返回', () => { currentScreen = 'modeSelect'; }, 'success');
            
            uiButtons.forEach((btn, i) => drawButton(btn, hoveredBtn === i));
        }

        // ==================== LEVEL SELECT SCREEN ====================
        function drawLevelSelectScreen() {
            clearButtons();
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // World tabs
            let tabY = 30;
            let tabW = 120, tabH = 45;
            for (let w = 0; w < 3; w++) {
                let unlocked = gameData.unlockedWorlds[w];
                let selected = selectedWorld === w;
                addButton(50 + w * (tabW + 15), tabY, tabW, tabH, (unlocked ? '' : '🔒 ') + WORLDS[w], () => {
                    if (unlocked) selectedWorld = w;
                }, unlocked ? 'normal' : 'disabled', selected ? '#4ecdc4' : '#ffd700');
            }

            // Level grid
            let gridStartX = 80, gridStartY = 120;
            let cellW = 90, cellH = 100, gap = 15;
            
            for (let l = 0; l < 10; l++) {
                let col = l % 5, row = Math.floor(l / 5);
                let x = gridStartX + col * (cellW + gap);
                let y = gridStartY + row * (cellH + gap);
                let worldComplete = isWorldComplete(selectedWorld);
                let levelUnlocked = isLevelUnlocked(selectedWorld, l);
                let stars = gameData.levels[selectedWorld][l];
                
                let canPlay = levelUnlocked && getStamina() > 0;
                addButton(x, y, cellW, cellH, levelUnlocked ? `${l + 1}关` : '🔒', () => {
                    if (canPlay) {
                        selectedLevel = { world: selectedWorld, level: l };
                        currentScreen = 'playing';
                        gameMode = 'level';
                        startLevelGame(selectedWorld, l);
                    }
                }, canPlay ? 'normal' : 'disabled');
                
                if (levelUnlocked) {
                    drawStars(x + cellW/2 - 22, y + cellH - 25, stars, 10);
                }
            }

            // World info
            ctx.fillStyle = '#aaa';
            ctx.font = '16px Segoe UI';
            ctx.textAlign = 'center';
            let worldComplete2 = isWorldComplete(selectedWorld);
            let nextUnlock = selectedWorld === 0 ? '矿山：森林10关全通' : (selectedWorld === 1 ? '冰原：矿山10关全通' : '已全部解锁');
            ctx.fillText(nextUnlock, canvas.width / 2, 370);

            addButton(50, 50, 100, 40, '← 返回', () => { currentScreen = 'instantItemSelect'; }, 'success');
            
            uiButtons.forEach((btn, i) => drawButton(btn, hoveredBtn === i));
        }

        function isWorldComplete(world) {
            return gameData.levels[world].every(s => s >= 1);
        }

        function isLevelUnlocked(world, level) {
            if (world === 0) return level === 0 || gameData.levels[0][level - 1] >= 1;
            if (world === 1) return gameData.unlockedWorlds[1] && (level === 0 || gameData.levels[1][level - 1] >= 1);
            if (world === 2) return gameData.unlockedWorlds[2] && (level === 0 || gameData.levels[2][level - 1] >= 1);
            return false;
        }

        // ==================== SHOP SCREEN ====================
        function drawShopScreen() {
            clearButtons();
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let cx = canvas.width / 2;
            
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 42px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('商店', cx, 50);
            
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 20px Segoe UI';
            ctx.fillText(`💰 ${gameData.coins}`, cx, 90);

            // Tabs
            let tabs = ['passive', 'mole', 'hammer', 'gacha'];
            let tabLabels = ['被动道具', '地鼠皮肤', '锤子皮肤', '盲盒'];
            let tabW = 100, tabH = 40, tabY = 120;
            tabs.forEach((t, i) => {
                addButton(50 + i * (tabW + 10), tabY, tabW, tabH, tabLabels[i], () => { shopTab = t; }, shopTab === t ? 'normal' : 'disabled', shopTab === t ? '#4ecdc4' : '#ffd700');
            });

            // Items
            let itemY = 190;
            ctx.textAlign = 'left';
            
            if (shopTab === 'passive') {
                SHOP_ITEMS.passive.forEach((item, i) => {
                    let currentLevel = gameData.passiveLevels[item.id];
                    let maxed = currentLevel >= item.maxLevel;
                    let cost = item.cost * (currentLevel + 1);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px Segoe UI';
                    ctx.fillText(`${item.icon} ${item.name}`, 80, itemY + i * 80);
                    ctx.fillStyle = '#aaa';
                    ctx.font = '14px Segoe UI';
                    ctx.fillText(`${item.desc} (${currentLevel}/${item.maxLevel})`, 80, itemY + i * 80 + 25);
                    
                    let btnX = 500, btnW = 120;
                    if (!maxed) {
                        addButton(btnX, itemY + i * 80 - 15, btnW, 40, `💰 ${cost}`, () => {
                            if (gameData.coins >= cost) {
                                gameData.coins -= cost;
                                gameData.passiveLevels[item.id]++;
                                saveGame();
                            }
                        }, gameData.coins >= cost ? 'normal' : 'disabled');
                    } else {
                        ctx.fillStyle = '#4ecdc4';
                        ctx.font = 'bold 16px Segoe UI';
                        ctx.fillText('已满级', btnX + 40, itemY + i * 80);
                    }
                });
            } else if (shopTab === 'mole') {
                SHOP_ITEMS.moleSkins.forEach((item, i) => {
                    let owned = gameData.ownedMoleSkins[item.skinIndex];
                    let equipped = gameData.equippedMoleSkin === item.skinIndex;
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px Segoe UI';
                    ctx.fillText(`${item.name}`, 80, itemY + i * 70);
                    
                    let btnX = 500, btnW = 120;
                    if (!owned) {
                        addButton(btnX, itemY + i * 70 - 15, btnW, 40, `💰 ${item.cost}`, () => {
                            if (gameData.coins >= item.cost) {
                                gameData.coins -= item.cost;
                                gameData.ownedMoleSkins[item.skinIndex] = true;
                                saveGame();
                            }
                        }, gameData.coins >= item.cost ? 'normal' : 'disabled');
                    } else if (!equipped) {
                        addButton(btnX, itemY + i * 70 - 15, btnW, 40, '装备', () => {
                            gameData.equippedMoleSkin = item.skinIndex;
                            saveGame();
                        }, 'normal', '#4ecdc4');
                    } else {
                        ctx.fillStyle = '#4ecdc4';
                        ctx.font = 'bold 16px Segoe UI';
                        ctx.fillText('已装备', btnX + 40, itemY + i * 70);
                    }
                });
            } else if (shopTab === 'hammer') {
                SHOP_ITEMS.hammerSkins.forEach((item, i) => {
                    let owned = gameData.ownedHammerSkins[item.skinIndex];
                    let equipped = gameData.equippedHammerSkin === item.skinIndex;
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px Segoe UI';
                    ctx.fillText(`${item.name}`, 80, itemY + i * 70);
                    
                    let btnX = 500, btnW = 120;
                    if (!owned) {
                        addButton(btnX, itemY + i * 70 - 15, btnW, 40, `💰 ${item.cost}`, () => {
                            if (gameData.coins >= item.cost) {
                                gameData.coins -= item.cost;
                                gameData.ownedHammerSkins[item.skinIndex] = true;
                                saveGame();
                            }
                        }, gameData.coins >= item.cost ? 'normal' : 'disabled');
                    } else if (!equipped) {
                        addButton(btnX, itemY + i * 70 - 15, btnW, 40, '装备', () => {

        function doGacha() {
            gachaResult = [];
            let rollCount = 10;
            let guaranteedR = false;
            
            for (let i = 0; i < rollCount; i++) {
                let isR = i === 9 || Math.random() < 0.15;
                if (isR) guaranteedR = true;
                
                let type = Math.random();
                let item;
                if (type < 0.4) {
                    // Mole skin
                    let owned = gameData.ownedMoleSkins.map((o, idx) => o ? -1 : idx).filter(idx => idx > 0);
                    if (owned.length > 0) {
                        let idx = owned[Math.floor(Math.random() * owned.length)];
                        item = { type: 'mole', name: MOLE_SKINS[idx], rarity: 'R', skinIndex: idx };
                        gameData.ownedMoleSkins[idx] = true;
                    } else { item = { type: 'mole', name: '金币+50', rarity: 'N', skinIndex: 0 }; }
                } else if (type < 0.7) {
                    // Hammer skin
                    let owned = gameData.ownedHammerSkins.map((o, idx) => o ? -1 : idx).filter(idx => idx > 0);
                    if (owned.length > 0) {
                        let idx = owned[Math.floor(Math.random() * owned.length)];
                        item = { type: 'hammer', name: HAMMER_SKINS[idx], rarity: 'R', skinIndex: idx };
                        gameData.ownedHammerSkins[idx] = true;
                    } else { item = { type: 'hammer', name: '金币+50', rarity: 'N', skinIndex: 0 }; }
                } else {
                    // Coins
                    item = { type: 'coins', name: `金币+${guaranteedR ? 200 : 100}`, rarity: 'N' };
                    gameData.coins += guaranteedR ? 200 : 100;
                }
                gachaResult.push(item);
            }
            saveGame();
            gachaAnimating = false;
        }

        // Ground
        let ground, groundMat;
        function createGround(theme) {
            if (ground) scene.remove(ground);

            groundMat = new THREE.MeshStandardMaterial({ 
                color: theme.ground,
                roughness: 0.9,
                metalness: 0.0
            });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            scene.background = new THREE.Color(theme.bg);
            scene.fog = new THREE.Fog(theme.bg, 15, 35);
        }
        createGround(WORLD_THEMES[0]);

        // Grass patches
        let grassPatches = [];
        function createGrassPatches(theme) {
            grassPatches.forEach(p => scene.remove(p));
            grassPatches = [];
            for (let i = 0; i < 200; i++) {
                const patchGeo = new THREE.CircleGeometry(Math.random() * 0.1 + 0.05, 6);
                const patchMat = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(0.25 + Math.random() * 0.1, 0.6, 0.3 + Math.random() * 0.15)
                });
                const patch = new THREE.Mesh(patchGeo, patchMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 10 + 2;
                patch.position.set(Math.cos(angle) * radius, 0.01, Math.sin(angle) * radius);
                patch.rotation.x = -Math.PI / 2;
                scene.add(patch);
                grassPatches.push(patch);
            }
        }
        createGrassPatches(WORLD_THEMES[0]);

        // Holes
        const holes = [];
        const holeGroup = new THREE.Group();
        scene.add(holeGroup);

        function createHoles() {
            while (holeGroup.children.length > 0) {
                holeGroup.remove(holeGroup.children[0]);
            }
            holes.length = 0;
            
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    const x = (col - 1) * 3;
                    const z = (row - 1) * 3;

                    const rimGeo = new THREE.TorusGeometry(0.7, 0.15, 16, 32);
                    const rimMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.8 });
                    const rim = new THREE.Mesh(rimGeo, rimMat);
                    rim.rotation.x = -Math.PI / 2;
                    rim.position.set(x, 0.02, z);
                    rim.castShadow = true;
                    rim.receiveShadow = true;
                    holeGroup.add(rim);

                    const holeGeo = new THREE.CircleGeometry(0.6, 32);
                    const holeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1 });
                    const holeMesh = new THREE.Mesh(holeGeo, holeMat);
                    holeMesh.rotation.x = -Math.PI / 2;
                    holeMesh.position.set(x, 0.01, z);
                    holeGroup.add(holeMesh);

                    holes.push({ x, z, occupied: false, mole: null });
                }
            }
        }
        createHoles();

        // Mole creation with skin support
        function createMole(skinIndex = 0) {

            // Dino additions

            // Mech additions

            // Nose

            const noseMat = new THREE.MeshStandardMaterial({ color: 0xff6699, roughness: 0.5 });
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.set(0, 0.88, 0.52);

            const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);

            moleGroup.add(leftEye);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);

            const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const leftHighlight = new THREE.Mesh(highlightGeo, highlightMat);
            leftHighlight.position.set(-0.13, 1.03, 0.41);
            moleGroup.add(leftHighlight);
            const rightHighlight = new THREE.Mesh(highlightGeo, highlightMat);
            rightHighlight.position.set(0.17, 1.03, 0.41);
            moleGroup.add(rightHighlight);

            // Ears
            const earGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const leftEar = new THREE.Mesh(earGeo, bodyMat);

            leftEar.castShadow = true;
            moleGroup.add(leftEar);
            const rightEar = new THREE.Mesh(earGeo, bodyMat);
            rightEar.position.set(0.35, 1.2, 0);
            rightEar.castShadow = true;
            moleGroup.add(rightEar);

            // Cheeks
            const cheekGeo = new THREE.SphereGeometry(0.1, 16, 16);
            const cheekMat = new THREE.MeshStandardMaterial({ color: 0xffaaaa, transparent: true, opacity: 0.5 });
            const leftCheek = new THREE.Mesh(cheekGeo, cheekMat);
            leftCheek.position.set(-0.28, 0.9, 0.3);
            leftCheek.scale.set(1, 0.6, 0.3);
            moleGroup.add(leftCheek);
            const rightCheek = new THREE.Mesh(cheekGeo, cheekMat);
            rightCheek.position.set(0.28, 0.9, 0.3);
            rightCheek.scale.set(1, 0.6, 0.3);

            const toothGeo = new THREE.BoxGeometry(0.08, 0.1, 0.05);
            const toothMat = new THREE.MeshStandardMaterial({ color: 0xfffff0 });

            leftTooth.position.set(-0.06, 0.72, 0.4);
            moleGroup.add(leftTooth);
            const rightTooth = new THREE.Mesh(toothGeo, toothMat);
            rightTooth.position.set(0.06, 0.72, 0.4);

        // Game state
        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameMode = 'classic';
        let currentWorld = 0;
        let currentLevel = 0;
        let gameTimer = null;
        let moles = [];
        let instantItemUsed = { slow: false, double: false, super: 0 };

        // Show mole at hole
        function showMole(holeIndex) {
            if (holes[holeIndex].occupied) return;
            
            const mole = createMole(getEquippedMoleSkin());
            mole.position.set(holes[holeIndex].x, -1, holes[holeIndex].z);
            mole.userData.holeIndex = holeIndex;
            scene.add(mole);
            
            holes[holeIndex].occupied = true;
            holes[holeIndex].mole = mole;
            moles.push({ mesh: mole, holeIndex, state: 'rising', timer: 0, duration: 0, hit: false });

            const targetY = 0.6;
            let duration = 400 / getPassiveSpeedBonus();
            if (selectedInstantItem === 'slow') duration *= 2;
            
            const startTime = Date.now();
            const startY = -1;
            
            function animateRise() {
                if (!gameRunning || mole.userData.hit) return;
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3) * Math.cos(progress * Math.PI * 0.5);
                mole.position.y = startY + (targetY - startY) * eased;
                if (progress < 1) {
                    requestAnimationFrame(animateRise);
                }
            }
            animateRise();
        }

        // Hide mole
        function hideMole(moleData) {
            const mole = moleData.mesh;
            const holeIndex = moleData.holeIndex;
            
            holes[holeIndex].occupied = false;
            holes[holeIndex].mole = null;
            
            const duration = 300;
            const startTime = Date.now();
            const startY = mole.position.y;
            
            function animateHide() {
                if (!gameRunning) return;
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                mole.position.y = startY - progress * 1.2;
                if (progress < 1) {
                    requestAnimationFrame(animateHide);
                } else {
                    scene.remove(mole);
                    moles = moles.filter(m => m !== moleData);
                }
            }
            animateHide();
        }

        // Whack mole
        function whackMole(moleData) {
            if (moleData.hit) return;
            moleData.hit = true;
            
            // Super hammer always hits
            if (selectedInstantItem === 'super' && instantItemUsed.super < 5) {
                instantItemUsed.super++;
            }
            
            combo++;
            let points = 100 + (combo - 1) * 10;
            if (selectedInstantItem === 'double') points *= 2;
            score += points;
            
            updateScoreDisplay();
            showHitEffect(moleData);
            
            playWhackSound();
            
            const mole = moleData.mesh;
            const duration = 200;
            const startTime = Date.now();
            
            function animateWhack() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                mole.position.y = 0.6 - progress * 1.8;
                mole.rotation.z = (Math.random() - 0.5) * progress * 0.5;
                if (progress < 1) {
                    requestAnimationFrame(animateWhack);
                } else {
                    hideMole(moleData);
                }
            }
            animateWhack();
        }

        // Miss
        function miss() {
            combo = 0;
        }

        function updateScoreDisplay() {
            document.getElementById('score-display').textContent = score;
        }

        function showHitEffect(moleData) {
            const pos = moleData.mesh.position.clone();
            pos.y = 1;
            const screenPos = pos.project(camera);
            const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
            
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
        }

        // Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const crosshair = document.getElementById('crosshair');
            crosshair.style.left = event.clientX + 'px';
            crosshair.style.top = event.clientY + 'px';
        }

        function onClick(event) {
            if (!gameRunning || currentScreen !== 'playing') return;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            let hit = false;
            for (const intersect of intersects) {
                let obj = intersect.object;
                while (obj.parent && !obj.userData.isMole) {
                    obj = obj.parent;
                }
                if (obj.userData.isMole && !obj.userData.hit) {
                    const moleData = moles.find(m => m.mesh === obj);
                    if (moleData && !moleData.hit && moleData.state !== 'hiding') {
                        whackMole(moleData);
                        hit = true;
                        break;
                    }
                }
            }
            
            if (!hit && selectedInstantItem === 'super' && instantItemUsed.super < 5) {
                // Super hammer always hits nearest mole
                let nearest = null, nearestDist = Infinity;
                moles.forEach(m => {
                    if (!m.hit) {
                        let d = m.mesh.position.distanceTo(new THREE.Vector3(mouse.x, mouse.y, 0));
                        if (d < nearestDist) {
                            nearestDist = d;
                            nearest = m;
                        }
                    }
                });
                if (nearest) {
                    whackMole(nearest);
                    hit = true;
                }
            }
            
            if (!hit) miss();
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);

        // Game loop
        let lastSpawnTime = 0;
        let spawnInterval = 1200;

        function spawnLoop(time) {
            if (gameRunning && time - lastSpawnTime > spawnInterval) {
                const available = holes.map((h, i) => i).filter(i => !holes[i].occupied);
                if (available.length > 0) {
                    const holeIndex = available[Math.floor(Math.random() * available.length)];
                    showMole(holeIndex);
                    lastSpawnTime = time;
                }
            }
            requestAnimationFrame(spawnLoop);
        }
        requestAnimationFrame(spawnLoop);

        // Mole timeout
        setInterval(() => {
            if (!gameRunning) return;
            moles.forEach(moleData => {
                if (moleData.hit) return;
                moleData.timer++;
                if (moleData.timer > 60) {
                    moleData.state = 'hiding';
                    hideMole(moleData);
                }
            });
        }, 16);

        // Render loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (currentScreen === 'playing') {
                renderer.render(scene, camera);
            }
        }
        animate();

        // Game functions
        function startClassicGame() {
            score = 0;
            combo = 0;
            timeLeft = 30;
            gameRunning = true;
            currentWorld = 0;
            selectedInstantItem = null;
            instantItemUsed = { slow: false, double: false, super: 0 };
            
            createGround(WORLD_THEMES[0]);
            createGrassPatches(WORLD_THEMES[0]);
            
            document.getElementById('info').style.display = 'flex';
            document.getElementById('score-display').textContent = '0';
            document.getElementById('time-display').textContent = '30';
            document.getElementById('crosshair').style.display = 'block';
            
            clearMoles();
            
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-display').textContent = timeLeft;
                if (timeLeft <= 0) {
                    endClassicGame();
                }
            }, 1000);
        }

        function startLevelGame(world, level) {
            score = 0;
            combo = 0;
            timeLeft = 45;
            gameRunning = true;
            currentWorld = world;
            currentLevel = level;
            instantItemUsed = { slow: false, double: false, super: 0 };
            
            createGround(WORLD_THEMES[world]);
            createGrassPatches(WORLD_THEMES[world]);
            
            document.getElementById('info').style.display = 'flex';
            document.getElementById('score-display').textContent = '0';
            document.getElementById('time-display').textContent = '45';
            document.getElementById('crosshair').style.display = 'block';
            
            clearMoles();
            
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-display').textContent = timeLeft;
                if (timeLeft <= 0) {
                    endLevelGame();
                }
            }, 1000);
        }

        function clearMoles() {
            moles.forEach(m => {
                if (m.mesh.parent) scene.remove(m.mesh);
            });
            moles = [];
            holes.forEach(h => { h.occupied = false; h.mole = null; });
        }

        function endClassicGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            document.getElementById('crosshair').style.display = 'none';
            
            let coins = Math.floor(score / 10);
            gameData.coins += coins;
            saveGame();
            
            lastGameResult = {
                title: '时间到！',
                score: score,
                coins: coins,
                mode: 'classic'
            };
            currentScreen = 'gameover';
        }

        function endLevelGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            document.getElementById('crosshair').style.display = 'none';
            
            let stars = 0;
            if (score >= STAR_THRESHOLDS[0]) stars = 1;
            if (score >= STAR_THRESHOLDS[1]) stars = 2;
            if (score >= STAR_THRESHOLDS[2]) stars = 3;
            
            // Save best stars
            if (stars > gameData.levels[currentWorld][currentLevel]) {
                gameData.levels[currentWorld][currentLevel] = stars;
            }
            
            // Check world unlock
            if (currentWorld === 0 && isWorldComplete(0) && !gameData.unlockedWorlds[1]) {
                gameData.unlockedWorlds[1] = true;
            }
            if (currentWorld === 1 && isWorldComplete(1) && !gameData.unlockedWorlds[2]) {
                gameData.unlockedWorlds[2] = true;
            }
            
            let coins = Math.floor(score / 10);
            gameData.coins += coins;
            saveGame();
            
            lastGameResult = {
                title: stars >= 1 ? '🎉 过关！' : '😢 未过关',
                score: score,
                stars: stars,
                coins: coins,
                mode: 'level',
                world: currentWorld,
                level: currentLevel
            };
            currentScreen = 'gameover';
        }

        // Audio
        let audioCtx;
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playWhackSound() {
            if (!audioCtx) initAudio();
            if (!gameData.settings.sound) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeUI();
        });

        // Hide cursor initially
        document.body.style.cursor = 'none';

        // ==================== INFO BAR ====================
        const infoDiv = document.createElement('div');
        infoDiv.id = 'info';
        infoDiv.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:28px;font-weight:bold;text-shadow:2px 2px 4px rgba(0,0,0,0.5);z-index:100;display:none;gap:40px;';
        infoDiv.innerHTML = '<span>得分: <b id="score-display">0</b></span><span>时间: <b id="time-display">30</b>s</span>';
        document.body.appendChild(infoDiv);

        // ==================== UI RENDER LOOP ====================
        let hoveredBtn = -1;
        
        function renderUI() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (currentScreen === 'menu') drawMenuScreen();
            else if (currentScreen === 'modeSelect') drawModeSelectScreen();
            else if (currentScreen === 'instantItemSelect') drawInstantItemSelectScreen();
            else if (currentScreen === 'levelSelect') drawLevelSelectScreen();
            else if (currentScreen === 'shop') drawShopScreen();
            else if (currentScreen === 'collection') drawCollectionScreen();
            else if (currentScreen === 'gameover') drawGameOverScreen();
            
            requestAnimationFrame(renderUI);
        }
        renderUI();

        // Mouse events for UI
        canvas.addEventListener('mousemove', (e) => {
            hoveredBtn = -1;
            uiButtons.forEach((btn, i) => {
                if (isPointInButton(e.clientX, e.clientY, btn)) hoveredBtn = i;
            });
            canvas.style.pointerEvents = hoveredBtn >= 0 ? 'auto' : 'none';
            document.body.style.cursor = hoveredBtn >= 0 ? 'pointer' : 'none';
        });

        canvas.addEventListener('click', (e) => {
            if (hoveredBtn >= 0 && uiButtons[hoveredBtn]) {
                uiButtons[hoveredBtn].action();
                hoveredBtn = -1;
            }
        });

        // Initialize
        document.getElementById('info').style.display = 'none';

        // Debug export for test validation (function closure accesses module scope)
        window.__getGameState = function() {
            try {
                return {
                    currentScreen: typeof currentScreen !== 'undefined' ? currentScreen : null,
                    score: typeof score !== 'undefined' ? score : null,
                    gameRunning: typeof gameRunning !== 'undefined' ? gameRunning : null,
                    gameMode: typeof gameMode !== 'undefined' ? gameMode : null,
                    coins: typeof coins !== 'undefined' ? coins : null,
                    stamina: typeof getStamina === 'function' ? getStamina() : null,
                    gameData: typeof gameData !== 'undefined' ? JSON.parse(JSON.stringify(gameData)) : null
                };
            } catch(e) {
                return { error: e.message };
            }
        };
    </script>
</body>
</html>
