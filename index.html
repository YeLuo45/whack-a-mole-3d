<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 打地鼠</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 50%, #1a472a 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        #info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            gap: 40px;
        }
        #info span { 
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid rgba(255,215,0,0.3);
        }
        #score-display { color: #ff6b6b; }
        #time-display { color: #4ecdc4; }
        #start-screen, #game-over-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #game-over-screen { display: none; }
        h1 { color: #ffd700; font-size: 56px; margin-bottom: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        h2 { color: #ff6b6b; font-size: 42px; margin-bottom: 20px; }
        .subtitle { color: #aaa; font-size: 20px; margin-bottom: 40px; }
        .btn {
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
            color: #1a472a;
            border: none;
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 20px rgba(255,215,0,0.4);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,215,0,0.6); }
        .btn:active { transform: scale(0.98); }
        #final-score { color: #ffd700; font-size: 64px; margin: 20px 0; }
        .instructions { color: #888; font-size: 16px; margin-top: 30px; max-width: 400px; text-align: center; line-height: 1.6; }
        #crosshair {
            position: fixed;
            width: 40px; height: 40px;
            pointer-events: none;
            z-index: 50;
            transform: translate(-50%, -50%);
            display: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
        .hit-effect {
            position: fixed;
            width: 60px; height: 60px;
            border: 4px solid #ff6b6b;
            border-radius: 50%;
            pointer-events: none;
            animation: hitRing 0.4s ease-out forwards;
            z-index: 150;
        }
        @keyframes hitRing {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    
    <div id="info">
        <span>得分: <b id="score-display">0</b></span>
        <span>时间: <b id="time-display">30</b>s</span>
    </div>

    <div id="start-screen">
        <h1>3D 打地鼠</h1>
        <p class="subtitle">考验你的反应速度！</p>
        <button class="btn" id="start-btn">开始游戏</button>
        <p class="instructions">用鼠标瞄准地鼠，点击左键敲打。<br>30秒内尽可能多地击中地鼠！</p>
    </div>

    <div id="game-over-screen">
        <h2>时间到！</h2>
        <div id="final-score">0</div>
        <button class="btn" id="restart-btn">再来一局</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Game state
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameTimer = null;
        let moles = [];
        let activeMole = null;

        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a472a);
        scene.fog = new THREE.Fog(0x1a472a, 15, 35);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        dirLight.position.set(5, 12, 8);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 30;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.3);
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        // Ground
        const groundGeo = new THREE.CircleGeometry(12, 64);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x3d7a4a,
            roughness: 0.9,
            metalness: 0.0
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grass detail - small patches
        for (let i = 0; i < 200; i++) {
            const patchGeo = new THREE.CircleGeometry(Math.random() * 0.1 + 0.05, 6);
            const patchMat = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color().setHSL(0.25 + Math.random() * 0.1, 0.6, 0.3 + Math.random() * 0.15)
            });
            const patch = new THREE.Mesh(patchGeo, patchMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 10 + 2;
            patch.position.set(Math.cos(angle) * radius, 0.01, Math.sin(angle) * radius);
            patch.rotation.x = -Math.PI / 2;
            scene.add(patch);
        }

        // Holes
        const holes = [];
        const holeGroup = new THREE.Group();
        scene.add(holeGroup);

        for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 3; col++) {
                const x = (col - 1) * 3;
                const z = (row - 1) * 3;

                // Hole rim (torus)
                const rimGeo = new THREE.TorusGeometry(0.7, 0.15, 16, 32);
                const rimMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.8 });
                const rim = new THREE.Mesh(rimGeo, rimMat);
                rim.rotation.x = -Math.PI / 2;
                rim.position.set(x, 0.02, z);
                rim.castShadow = true;
                rim.receiveShadow = true;
                holeGroup.add(rim);

                // Hole inner (dark circle)
                const holeGeo = new THREE.CircleGeometry(0.6, 32);
                const holeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1 });
                const holeMesh = new THREE.Mesh(holeGeo, holeMat);
                holeMesh.rotation.x = -Math.PI / 2;
                holeMesh.position.set(x, 0.01, z);
                holeGroup.add(holeMesh);

                holes.push({ x, z, occupied: false, mole: null });
            }
        }

        // Mole creation function
        function createMole() {
            const moleGroup = new THREE.Group();

            // Body
            const bodyGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.scale.set(1, 0.8, 1);
            body.position.y = 0.4;
            body.castShadow = true;
            moleGroup.add(body);

            // Head
            const headGeo = new THREE.SphereGeometry(0.45, 32, 32);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.y = 0.9;
            head.castShadow = true;
            moleGroup.add(head);

            // Snout
            const snoutGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const snoutMat = new THREE.MeshStandardMaterial({ color: 0x6B4E0A, roughness: 0.8 });
            const snout = new THREE.Mesh(snoutGeo, snoutMat);
            snout.position.set(0, 0.85, 0.38);
            snout.scale.set(1, 0.7, 1);
            moleGroup.add(snout);

            // Nose
            const noseGeo = new THREE.SphereGeometry(0.06, 16, 16);
            const noseMat = new THREE.MeshStandardMaterial({ color: 0xff6699, roughness: 0.5 });
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.set(0, 0.88, 0.52);
            moleGroup.add(nose);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.15, 1.0, 0.35);
            moleGroup.add(leftEye);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.15, 1.0, 0.35);
            moleGroup.add(rightEye);

            // Eye highlights
            const highlightGeo = new THREE.SphereGeometry(0.03, 8, 8);
            const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const leftHighlight = new THREE.Mesh(highlightGeo, highlightMat);
            leftHighlight.position.set(-0.13, 1.03, 0.41);
            moleGroup.add(leftHighlight);
            const rightHighlight = new THREE.Mesh(highlightGeo, highlightMat);
            rightHighlight.position.set(0.17, 1.03, 0.41);
            moleGroup.add(rightHighlight);

            // Ears
            const earGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const leftEar = new THREE.Mesh(earGeo, bodyMat);
            leftEar.position.set(-0.35, 1.2, 0);
            leftEar.castShadow = true;
            moleGroup.add(leftEar);
            const rightEar = new THREE.Mesh(earGeo, bodyMat);
            rightEar.position.set(0.35, 1.2, 0);
            rightEar.castShadow = true;
            moleGroup.add(rightEar);

            // Cheeks (blush)
            const cheekGeo = new THREE.SphereGeometry(0.1, 16, 16);
            const cheekMat = new THREE.MeshStandardMaterial({ color: 0xffaaaa, transparent: true, opacity: 0.5 });
            const leftCheek = new THREE.Mesh(cheekGeo, cheekMat);
            leftCheek.position.set(-0.28, 0.9, 0.3);
            leftCheek.scale.set(1, 0.6, 0.3);
            moleGroup.add(leftCheek);
            const rightCheek = new THREE.Mesh(cheekGeo, cheekMat);
            rightCheek.position.set(0.28, 0.9, 0.3);
            rightCheek.scale.set(1, 0.6, 0.3);
            moleGroup.add(rightCheek);

            // Teeth
            const toothGeo = new THREE.BoxGeometry(0.08, 0.1, 0.05);
            const toothMat = new THREE.MeshStandardMaterial({ color: 0xfffff0 });
            const leftTooth = new THREE.Mesh(toothGeo, toothMat);
            leftTooth.position.set(-0.06, 0.72, 0.4);
            moleGroup.add(leftTooth);
            const rightTooth = new THREE.Mesh(toothGeo, toothMat);
            rightTooth.position.set(0.06, 0.72, 0.4);
            moleGroup.add(rightTooth);

            moleGroup.userData = { isMole: true, baseY: 0, hit: false };
            return moleGroup;
        }

        // Show mole at hole
        function showMole(holeIndex) {
            if (holes[holeIndex].occupied) return;
            
            const mole = createMole();
            mole.position.set(holes[holeIndex].x, -1, holes[holeIndex].z);
            mole.userData.holeIndex = holeIndex;
            scene.add(mole);
            
            holes[holeIndex].occupied = true;
            holes[holeIndex].mole = mole;
            moles.push({ mesh: mole, holeIndex, state: 'rising', timer: 0, duration: 0, hit: false });

            // Rising animation
            const targetY = 0.6;
            const duration = 400;
            const startTime = Date.now();
            const startY = -1;
            
            function animateRise() {
                if (!gameRunning || mole.userData.hit) return;
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Elastic ease out
                const eased = 1 - Math.pow(1 - progress, 3) * Math.cos(progress * Math.PI * 0.5);
                mole.position.y = startY + (targetY - startY) * eased;
                if (progress < 1) {
                    requestAnimationFrame(animateRise);
                }
            }
            animateRise();
        }

        // Hide mole
        function hideMole(moleData) {
            const mole = moleData.mesh;
            const holeIndex = moleData.holeIndex;
            
            holes[holeIndex].occupied = false;
            holes[holeIndex].mole = null;
            
            const duration = 300;
            const startTime = Date.now();
            const startY = mole.position.y;
            
            function animateHide() {
                if (!gameRunning) return;
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                mole.position.y = startY - progress * 1.2;
                if (progress < 1) {
                    requestAnimationFrame(animateHide);
                } else {
                    scene.remove(mole);
                    moles = moles.filter(m => m !== moleData);
                }
            }
            animateHide();
        }

        // Whack mole
        function whackMole(moleData) {
            if (moleData.hit) return;
            moleData.hit = true;
            score += 10;
            document.getElementById('score-display').textContent = score;
            
            // Show hit effect at mole position
            const pos = moleData.mesh.position.clone();
            pos.y = 1;
            const screenPos = pos.project(camera);
            const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
            showHitEffect(x, y);
            
            // Play whack animation
            const mole = moleData.mesh;
            const duration = 200;
            const startTime = Date.now();
            
            function animateWhack() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                mole.position.y = 0.6 - progress * 1.8;
                mole.rotation.z = (Math.random() - 0.5) * progress * 0.5;
                if (progress < 1) {
                    requestAnimationFrame(animateWhack);
                } else {
                    hideMole(moleData);
                }
            }
            animateWhack();
        }

        // Hit effect visual
        function showHitEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
        }

        // Raycaster for mouse picking
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const crosshair = document.getElementById('crosshair');
            crosshair.style.left = event.clientX + 'px';
            crosshair.style.top = event.clientY + 'px';
        }

        function onClick(event) {
            if (!gameRunning) return;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            for (const intersect of intersects) {
                let obj = intersect.object;
                while (obj.parent && !obj.userData.isMole) {
                    obj = obj.parent;
                }
                if (obj.userData.isMole && !obj.userData.hit) {
                    const moleData = moles.find(m => m.mesh === obj);
                    if (moleData && !moleData.hit && moleData.state !== 'hiding') {
                        whackMole(moleData);
                        break;
                    }
                }
            }
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);

        // Game loop
        let lastSpawnTime = 0;
        let spawnInterval = 1200;

        function spawnLoop(time) {
            if (gameRunning && time - lastSpawnTime > spawnInterval) {
                // Find available holes
                const available = holes.map((h, i) => i).filter(i => !holes[i].occupied);
                if (available.length > 0) {
                    const holeIndex = available[Math.floor(Math.random() * available.length)];
                    showMole(holeIndex);
                    lastSpawnTime = time;
                }
            }
            requestAnimationFrame(spawnLoop);
        }
        requestAnimationFrame(spawnLoop);

        // Mole timeout handler
        setInterval(() => {
            if (!gameRunning) return;
            moles.forEach(moleData => {
                if (moleData.hit) return;
                moleData.timer++;
                if (moleData.timer > 60) { // About 1 second
                    moleData.state = 'hiding';
                    hideMole(moleData);
                }
            });
        }, 16);

        // Render loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Game functions
        function startGame() {
            score = 0;
            timeLeft = 30;
            gameRunning = true;
            document.getElementById('score-display').textContent = '0';
            document.getElementById('time-display').textContent = '30';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            
            // Clear any existing moles
            moles.forEach(m => {
                if (m.mesh.parent) scene.remove(m.mesh);
            });
            moles = [];
            holes.forEach(h => { h.occupied = false; h.mole = null; });
            
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-display').textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            document.getElementById('crosshair').style.display = 'none';
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over-screen').style.display = 'flex';
            
            // Hide all moles
            moles.forEach(m => {
                if (!m.hit) hideMole(m);
            });
        }

        // Event listeners
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Hide cursor initially
        document.body.style.cursor = 'none';
    </script>
</body>
</html>
